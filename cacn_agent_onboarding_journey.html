  .phase-pill.active { background: var(--color-background-info); border-color: var(--color-border-info); }
  .phase-pill.active .pnum { color: var(--color-text-info); }
  .phase-pill.active .pname { color: var(--color-text-info); }

  .pname { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-align: center; line-height: 1.3; }

  .lane { padding: 16px 20px; border-right: 0.5px solid var(--color-border-tertiary); }
  .lane:last-child { border-right: none; }
  .lane-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .lane-dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .lane-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; color: var(--color-text-tertiary); }
  .task-item { display: flex; gap: 8px; margin-bottom: 8px; }
  .task-icon { font-size: 14px; flex: 0 0 auto; margin-top: 1px; }
  .task-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.5; }
  .task-sub { font-size: 12px; color: var(--color-text-secondary); line-height: 1.4; margin-top: 2px; }

    margin: 0 20px 14px;
    padding: 12px 14px; border-radius: 8px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-left: 3px solid var(--sys-border);

  .tech-list { font-size: 12px; color: var(--color-text-secondary); line-height: 1.7; }
  .gate-row {
    margin: 0 20px 14px;

  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }

let current = 0;

function renderPipeline() {
  const el = document.getElementById('pipeline');
  let html = '';
  PHASES.forEach((p, i) => {
    if (i > 0) html += `<div class="arrow-sep">›</div>`;
    html += `<div class="phase-pill ${i === current ? 'active' : ''}" onclick="showPhase(${i})">
      <span class="pnum">${p.code}</span>
      <span class="pname">${p.name}</span>
    </div>`;
  });
  el.innerHTML = html;
}

function renderDetail() {
  const p = PHASES[current];
  const badgeMap = {
    agent: '<span class="badge badge-agent">Agent</span>',
    sys: '<span class="badge badge-sys">System</span>',
    cacn: '<span class="badge badge-cacn">CACN / Ops</span>',
    gate: '<span class="badge badge-gate">Decision gate</span>'
  };
  const badges = p.badges.map(b => badgeMap[b]).join('');

  function renderTasks(list) {
    if (!list.length) return '<p style="font-size:13px;color:var(--color-text-tertiary);font-style:italic;">Không có tác vụ trong bước này</p>';
    return list.map(t => `<div class="task-item">
      <span class="task-icon" style="color:var(--color-text-secondary)">${t.icon}</span>
      <div><div class="task-text">${t.text}</div><div class="task-sub">${t.sub}</div></div>
    </div>`).join('');
  }

  const gateHtml = p.gate ? `<div class="gate-row">
    <span class="gate-icon">◆</span>
    <div><div class="gate-label">Decision gate</div><div class="gate-text">${p.gate}</div></div>
  </div>` : '';

  const techHtml = p.tech ? `<div class="tech-row">
    <div class="tech-label">Tech notes</div>
    <div class="tech-list">${p.tech}</div>
  </div>` : '';

  const prev = current > 0 ? `<button class="nav-btn" onclick="showPhase(${current-1})">← ${PHASES[current-1].code} ${PHASES[current-1].name}</button>` : '';
  const next = current < PHASES.length - 1 ? `<button class="nav-btn next" onclick="showPhase(${current+1})">${PHASES[current+1].code} ${PHASES[current+1].name} →</button>` : '';

  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <div class="detail-header-left">
        <div class="detail-phase-num">${p.code} · Bước ${current + 1} / ${PHASES.length}</div>
        <div class="detail-phase-name">${p.name}</div>
        <div class="detail-phase-desc">${p.desc}</div>
        <div class="detail-badges">${badges}<span class="sla-badge">SLA: ${p.sla}</span></div>
      </div>
    </div>
    <div class="swimlanes">
      <div class="lane">
        <div class="lane-header"><div class="lane-dot" style="background:#7F77DD"></div><span class="lane-title">Agent thực hiện</span></div>
        ${renderTasks(p.agent)}
      </div>
      <div class="lane">
        <div class="lane-header"><div class="lane-dot" style="background:#1D9E75"></div><span class="lane-title">System tự động</span></div>
        ${renderTasks(p.system)}
      </div>
      <div class="lane">
        <div class="lane-header"><div class="lane-dot" style="background:#BA7517"></div><span class="lane-title">CACN / Ops xử lý</span></div>
        ${renderTasks(p.cacn)}
      </div>
    </div>
    ${gateHtml}
    ${techHtml}
    <div class="nav-row">${prev}${next}</div>
  `;
}

function showPhase(i) {
  current = i;
  renderPipeline();
  renderDetail();
}

showPhase(0);
</script>
